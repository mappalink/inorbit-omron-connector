common:
  location_tz: Europe/Amsterdam
  connector_type: OmronARCL
  connector_version: "0.1.0"

  env_vars:
    INORBIT_API_KEY: "${INORBIT_API_KEY}"

  arcl_port: 7171
  arcl_password: "${OMRON_ARCL_PASSWORD}"
  poll_frequency: 1.0

  map_file: "/config/omron_map.png"
  map_resolution: 0.02
  map_origin_x: -4.46
  map_origin_y: -8.94

  # Laser scanner names (empty = no laser publishing)
  laser_names:
    - "Laser_1"
    - "Laser_2"
    - "Laser_3"
  # laser_angle_min: -3.14159  # -pi (full 360°)
  # laser_angle_max: 3.14159   # +pi
  # laser_range_max: 30.0      # meters
  # laser_n_points: 720        # 360° at 0.5° resolution

  # Edge executor mission persistence (optional, defaults to missions_<robot_id>.db)
  # mission_database_file: "/data/missions.db"

omron-hd1500:
  robot_name: "Omron HD1500"
  arcl_host: "10.200.0.2"
  map_id: "omron_heal"
