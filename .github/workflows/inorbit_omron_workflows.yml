name: Omron Connector Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Test with tox
        run: uv run tox

  reuse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v6

  publish-docker:
    if: ${{ contains(github.event.head_commit.message, 'Bump inorbit-omron-connector version') }}
    needs: [lint-and-test, reuse]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v5
      - name: Read version from pyproject
        id: version
        uses: cssnr/toml-action@v1
        with:
          file: pyproject.toml
          path: $.project.version
      - name: Export version to env
        run: |
          echo "OMRON_CONNECTOR_VERSION=${{ steps.version.outputs.value }}" >> $GITHUB_ENV
          echo "OMRON_CONNECTOR_VERSION is '${{ steps.version.outputs.value }}'"
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mappalink/inorbit-omron-connector
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.OMRON_CONNECTOR_VERSION }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ env.OMRON_CONNECTOR_VERSION }}" -m "inorbit-omron-connector v${{ env.OMRON_CONNECTOR_VERSION }}"
          git push origin "v${{ env.OMRON_CONNECTOR_VERSION }}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.OMRON_CONNECTOR_VERSION }}
          name: Release v${{ env.OMRON_CONNECTOR_VERSION }}
          body: |
            Release v${{ env.OMRON_CONNECTOR_VERSION }}

            Docker image: `ghcr.io/mappalink/inorbit-omron-connector:${{ env.OMRON_CONNECTOR_VERSION }}`
          draft: false
          prerelease: false
